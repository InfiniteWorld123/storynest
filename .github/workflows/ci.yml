name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://localhost:3000
      BETTER_AUTH_SECRET: test-secret-for-ci
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/storynest
      RESEND: re_test
      EMAIL_FROM: StoryNest <noreply@example.com>
      CONTACT_TO_EMAIL: contact@example.com
      UPLOADTHING_TOKEN: sk_test
      ENABLE_SEED_ROUTES: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
